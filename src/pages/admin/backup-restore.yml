# ============================================================
# File: .github/workflows/backup-restore.yml
# Save to: your-project/.github/workflows/backup-restore.yml
# ============================================================

name: Backup & Restore

on:
  # Run every Sunday at 10:00 AM IST (4:30 AM UTC)
  schedule:
    - cron: '30 4 * * 0'
  
  # Allow manual trigger from website admin panel
  repository_dispatch:
    types: [manual-backup, restore-code, restore-db]

jobs:

  # ── Manual Backup Job ──────────────────────────────────────
  manual-backup:
    if: github.event_name == 'schedule' || github.event.action == 'manual-backup'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Supabase CLI
        run: |
          curl -sSL https://github.com/supabase/cli/releases/latest/download/supabase_linux_amd64.tar.gz | tar -xz
          sudo mv supabase /usr/local/bin/

      - name: Backup Database
        env:
          DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          DATE=$(date +%Y-%m-%d)
          supabase db dump --db-url "$DB_URL" --data-only -f "data_backup_${DATE}.sql"
          echo "✅ Database backed up as data_backup_${DATE}.sql"

      - name: Commit and Push Backup
        run: |
          git config user.name "Backup Bot"
          git config user.email "backup@shreerangtrendz.com"
          git add data_backup_*.sql
          git commit -m "backup: automated backup $(date +%Y-%m-%d)" || echo "Nothing to commit"
          git push

  # ── Restore Code Job ──────────────────────────────────────
  restore-code:
    if: github.event.action == 'restore-code'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Restore to commit
        run: |
          COMMIT_SHA="${{ github.event.client_payload.commit_sha }}"
          echo "Restoring to commit: $COMMIT_SHA"
          git config user.name "Restore Bot"
          git config user.email "restore@shreerangtrendz.com"
          git checkout $COMMIT_SHA -- src/
          git commit -m "restore: rolled back to $COMMIT_SHA on $(date +%Y-%m-%d)"
          git push
          echo "✅ Code restored and pushed - Vercel will auto-deploy!"

  # ── Restore DB Job ────────────────────────────────────────
  restore-db:
    if: github.event.action == 'restore-db'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install PostgreSQL client
        run: sudo apt-get install -y postgresql-client

      - name: Install Supabase CLI
        run: |
          curl -sSL https://github.com/supabase/cli/releases/latest/download/supabase_linux_amd64.tar.gz | tar -xz
          sudo mv supabase /usr/local/bin/

      - name: Backup current DB before restore
        env:
          DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          DATE=$(date +%Y-%m-%d-%H%M)
          supabase db dump --db-url "$DB_URL" --data-only -f "data_backup_before_restore_${DATE}.sql"
          git config user.name "Restore Bot"
          git config user.email "restore@shreerangtrendz.com"
          git add data_backup_before_restore_*.sql
          git commit -m "safety: backup before DB restore $DATE" || echo "Nothing to commit"
          git push

      - name: Restore Database
        env:
          DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          BACKUP_FILE="${{ github.event.client_payload.backup_file }}"
          echo "Restoring from: $BACKUP_FILE"
          psql "$DB_URL" -f "$BACKUP_FILE"
          echo "✅ Database restored from $BACKUP_FILE"
